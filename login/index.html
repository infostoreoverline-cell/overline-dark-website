<!DOCTYPE html>
<html lang="it" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OVERLINE — Accedi all'Armeria</title>
<meta name="description" content="Accedi al tuo account Overline."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"/>
<style>
:root {
  --bg:        #030303;
  --surface:   #0d0d0d;
  --text:      #F0F0F0;
  --muted:     #888888;
  --accent:    #E60000;
  --outline:   #2A2A2A;
  --f-display: 'Anton', sans-serif;
  --f-mono:    'JetBrains Mono', monospace;
  --f-body:    'Hanken Grotesk', sans-serif;
  --ease-expo: cubic-bezier(0.16,1,0.3,1);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100vh;
  overflow: hidden; /* Prevent scrolling for the login page */
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--f-body);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ── BACKGROUND IMAGE & VIGNETTE ── */
.bg-container {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.bg-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: 25% center;
  filter: blur(3px) grayscale(20%);
  opacity: 0.85;
  transform: scale(1.15); /* Slight zoom to hide blur edges */
}

.bg-container::after {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse at center, transparent 20%, rgba(3,3,3,0.85) 100%),
    linear-gradient(to bottom, rgba(3,3,3,0.4) 0%, rgba(3,3,3,0.7) 100%);
  z-index: 1;
}

/* ── LOGIN WRAPPER ── */
.login-wrapper {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 440px;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── LOGIN CARD ── */
.login-card {
  width: 100%;
  background: rgba(13, 13, 13, 0.65);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--outline);
  border-left: 2px solid var(--accent);
  padding: 48px 40px;
  opacity: 0;
  transform: translateY(30px);
}

.login-header {
  margin-bottom: 32px;
  text-align: center;
}

.login-header h1 {
  font-family: var(--f-display);
  font-size: 40px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  line-height: 1;
  margin-bottom: 12px;
}

.login-header p {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
}

.form-group {
  margin-bottom: 32px;
  position: relative;
}

.form-group label {
  display: flex;
  align-items: center;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
  transition: transform 0.4s var(--ease-expo), color 0.4s var(--ease-expo);
}

.form-group label::before {
  content: '';
  display: block;
  width: 0;
  height: 2px;
  background: var(--accent);
  margin-right: 0;
  transition: width 0.4s var(--ease-expo), margin-right 0.4s var(--ease-expo);
}

.form-group input {
  width: 100%;
  background: #000;
  border: 1px solid var(--outline);
  padding: 16px;
  font-family: var(--f-mono);
  font-size: 14px;
  color: var(--text);
  outline: none;
  box-shadow: inset 0 0 0 0 var(--accent);
  transition: border-color 0.4s var(--ease-expo), background 0.4s var(--ease-expo), box-shadow 0.4s var(--ease-expo), padding-left 0.4s var(--ease-expo);
}

.form-group:focus-within label {
  color: var(--text);
  transform: translateX(4px);
}

.form-group:focus-within label::before {
  width: 12px;
  margin-right: 8px;
}

.form-group input:focus {
  border-color: var(--accent);
  background: #050505;
  box-shadow: inset 4px 0 0 0 var(--accent);
  padding-left: 20px;
}

/* Typing effect class added via JS */
.form-group input.is-typing {
  background: #0a0a0a;
  box-shadow: inset 8px 0 0 0 var(--accent);
}

.form-group input::placeholder {
  color: rgba(255,255,255,0.2);
  font-family: var(--f-mono);
  font-size: 12px;
}

.forgot-pwd {
  position: absolute;
  top: 0;
  right: 0;
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.3s ease;
}

.forgot-pwd:hover {
  color: var(--accent);
}

.pwd-toggle {
  position: absolute;
  right: 16px;
  bottom: 18px;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--muted);
  background: transparent;
  border: none;
  cursor: pointer;
  transition: color 0.3s ease;
}

.pwd-toggle:hover {
  color: var(--text);
}

/* ── CTA BUTTON ── */
.cta-btn {
  display: block;
  width: 100%;
  background: transparent;
  border: 1px solid var(--text);
  padding: 18px;
  font-family: var(--f-mono);
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text);
  position: relative;
  overflow: hidden;
  transition: color 0.4s var(--ease-expo), border-color 0.4s var(--ease-expo);
  cursor: pointer;
  margin-top: 16px;
}

.cta-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.5s var(--ease-expo);
}

.cta-btn:hover::before {
  transform: scaleX(1);
}

.cta-btn:hover {
  color: #fff;
  border-color: var(--accent);
}

.cta-btn span {
  position: relative;
  z-index: 1;
}

/* ── FOOTER LINKS ── */
.login-footer {
  margin-top: 32px;
  text-align: center;
  font-family: var(--f-mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.05em;
}

.login-footer a {
  color: var(--text);
  text-decoration: none;
  transition: color 0.3s;
  margin-left: 8px;
  border-bottom: 1px solid transparent;
}

.login-footer a:hover {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ── REVEAL EFFECTS ── */
.reveal-wrap { overflow: hidden; display: block; }
.reveal-line { display: block; overflow: hidden; transform: translateY(100%); opacity: 0; }

/* ── SCREEN SHAKE EFFECT ── */
@keyframes shake {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  10% { transform: translate(-15px, -15px) rotate(-1deg); }
  20% { transform: translate(15px, 15px) rotate(1deg); }
  30% { transform: translate(-20px, 10px) rotate(-2deg); }
  40% { transform: translate(20px, -10px) rotate(2deg); }
  50% { transform: translate(-15px, -15px) rotate(-1deg); }
  60% { transform: translate(15px, 15px) rotate(1deg); }
  70% { transform: translate(-10px, 5px) rotate(-0.5deg); }
  80% { transform: translate(10px, -5px) rotate(0.5deg); }
  90% { transform: translate(-5px, -5px) rotate(0deg); }
}

.shake {
  animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
  transform-origin: center center;
}

/* ── RESPONSIVE ── */
@media(max-width: 480px) {
  .login-card {
    padding: 40px 24px;
  }
  .login-header h1 {
    font-size: 32px;
  }
}
</style>
</head>
<body>

  <!-- BACKGROUND -->
  <div class="bg-container">
    <img id="bg-image" src="sfondo/sfondo portamaniglie.webp" alt="Background">
  </div>

  <!-- LOGIN CONTAINER -->
  <div class="login-wrapper">
    
    <div class="login-card" id="card">
      <div class="login-header">
        <h1><span class="reveal-wrap"><span class="reveal-line">ACCESSO</span></span></h1>
        <p class="typewriter-text"></p>
      </div>

      <form action="#" method="POST" id="login-form">
        <div class="form-group stagger-item">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="nome@esempio.com" required autocomplete="email">
        </div>

        <div class="form-group stagger-item">
          <label for="password">Password</label>
          <a href="#" class="forgot-pwd">RECUPERA</a>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="pwd-toggle" id="togglePassword">MOSTRA</button>
        </div>

        <button type="submit" class="cta-btn stagger-item">
          <span>ACCEDI ALL'ATTREZZATURA</span>
        </button>
      </form>

      <div class="login-footer stagger-item">
        Non hai un account? <a href="#">Registrati</a>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/TextPlugin.min.js"></script>
  <script>
    gsap.registerPlugin(TextPlugin);

    // Animazioni di ingresso sobrie ma d'impatto (come richiesto)
    window.addEventListener('load', () => {
      
      const tl = gsap.timeline();

      // 1. Lieve zoom out del background per dare profondità
      tl.to('#bg-image', {
        scale: 1.05,
        duration: 2.5,
        ease: 'power2.out'
      }, 0);

      // 3. Fade in e slide su della login card
      tl.to('#card', {
        opacity: 1,
        y: 0,
        duration: 1.2,
        ease: 'expo.out'
      }, 0.2);

      // 4. Titolo principale svelato dal basso
      tl.to('.reveal-line', {
        y: 0,
        opacity: 1,
        duration: 1,
        ease: 'expo.out'
      }, 0.4);

      // 4b. Effetto macchina da scrivere (terminale) per il sottotitolo
      tl.to('.typewriter-text', {
        text: "INSERISCI I TUOI DATI_",
        duration: 0.8,
        ease: 'none'
      }, 0.5);

      // 5. Elementi interni svelati in sequenza "meccanica"
      tl.fromTo('.stagger-item', 
        { opacity: 0, x: -10 },
        { opacity: 1, x: 0, duration: 0.5, stagger: 0.05, ease: 'power4.out' },
        0.6
      );
      
      // 6. Effetti durante la digitazione (Typing Feedback)
      const inputs = document.querySelectorAll('.form-group input');
      let typingTimer;
      
      inputs.forEach(input => {
        input.addEventListener('input', () => {
          // Aggiunge la classe per l'effetto "glitch/impulso"
          input.classList.add('is-typing');
          
          // Rimuove l'effetto poco dopo che l'utente smette di digitare
          clearTimeout(typingTimer);
          typingTimer = setTimeout(() => {
            input.classList.remove('is-typing');
          }, 150);
        });
      });
      
      // 7. Mostra/Nascondi Password
      const togglePassword = document.getElementById('togglePassword');
      const passwordInput = document.getElementById('password');
      if (togglePassword && passwordInput) {
        togglePassword.addEventListener('click', function () {
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
          this.textContent = type === 'password' ? 'NASCONDI' : 'MOSTRA';
        });
      }

      // 8. Animazione "Screen Shake" su errore login
      const loginForm = document.getElementById('login-form');
      
      if (loginForm) {
        loginForm.addEventListener('submit', (e) => {
          e.preventDefault(); // Previene l'invio reale per mostrare l'animazione
          
          // Fa tremare l'intera pagina (body)
          document.body.classList.remove('shake');
          void document.body.offsetWidth; // Trigger reflow per forzare il riavvio
          document.body.classList.add('shake');

          // Flash rosso sugli input
          gsap.fromTo('.form-group input', 
            { borderColor: '#E60000', backgroundColor: 'rgba(230, 0, 0, 0.15)' },
            { borderColor: 'var(--outline)', backgroundColor: '#000', duration: 1.5, ease: 'power2.out' }
          );
        });
      }
    });
  </script>
</body>
</html>
