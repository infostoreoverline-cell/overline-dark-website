<!DOCTYPE html>
<html lang="it" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OVERLINE — Accedi all'Armeria</title>
<meta name="description" content="Accedi al tuo account Overline."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"/>
<style>
:root {
  --bg:        #030303;
  --surface:   #0d0d0d;
  --text:      #F0F0F0;
  --muted:     #888888;
  --accent:    #E60000;
  --outline:   #2A2A2A;
  --f-display: 'Anton', sans-serif;
  --f-mono:    'JetBrains Mono', monospace;
  --f-body:    'Hanken Grotesk', sans-serif;
  --ease-expo: cubic-bezier(0.16,1,0.3,1);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100vh;
  overflow: hidden; /* Prevent scrolling for the login page */
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--f-body);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ── BACKGROUND IMAGE & VIGNETTE ── */
.bg-container {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.bg-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  filter: blur(6px) grayscale(40%);
  opacity: 0.6;
  transform: scale(1.05); /* Slight zoom to hide blur edges */
}

.bg-container::after {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse at center, transparent 20%, rgba(3,3,3,0.85) 100%),
    linear-gradient(to bottom, rgba(3,3,3,0.4) 0%, rgba(3,3,3,0.7) 100%);
  z-index: 1;
}

/* ── LOGIN WRAPPER ── */
.login-wrapper {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 440px;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── LOGO ── */
.logo-container {
  margin-bottom: 48px;
  opacity: 0;
  transform: translateY(-20px);
}

.logo-container img {
  height: 48px;
  width: auto;
}

/* ── LOGIN CARD ── */
.login-card {
  width: 100%;
  background: rgba(13, 13, 13, 0.65);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--outline);
  border-top: 3px solid var(--accent);
  padding: 48px 40px;
  opacity: 0;
  transform: translateY(30px);
}

.login-header {
  margin-bottom: 32px;
  text-align: center;
}

.login-header h1 {
  font-family: var(--f-display);
  font-size: 40px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  line-height: 1;
  margin-bottom: 12px;
}

.login-header p {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
}

/* ── FORM ELEMENTS ── */
.form-group {
  margin-bottom: 24px;
  position: relative;
}

.form-group label {
  display: block;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.form-group input {
  width: 100%;
  background: rgba(3, 3, 3, 0.8);
  border: 1px solid var(--outline);
  padding: 16px;
  font-family: var(--f-body);
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.3s ease, background 0.3s ease;
}

.form-group input:focus {
  border-color: var(--accent);
  background: var(--bg);
}

.form-group input::placeholder {
  color: rgba(255,255,255,0.2);
  font-family: var(--f-mono);
  font-size: 12px;
}

.forgot-pwd {
  position: absolute;
  top: 0;
  right: 0;
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.3s ease;
}

.forgot-pwd:hover {
  color: var(--accent);
}

/* ── CTA BUTTON ── */
.cta-btn {
  display: block;
  width: 100%;
  background: transparent;
  border: 1px solid var(--text);
  padding: 18px;
  font-family: var(--f-mono);
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text);
  position: relative;
  overflow: hidden;
  transition: color 0.4s var(--ease-expo), border-color 0.4s var(--ease-expo);
  cursor: pointer;
  margin-top: 16px;
}

.cta-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.5s var(--ease-expo);
}

.cta-btn:hover::before {
  transform: scaleX(1);
}

.cta-btn:hover {
  color: #fff;
  border-color: var(--accent);
}

.cta-btn span {
  position: relative;
  z-index: 1;
}

/* ── FOOTER LINKS ── */
.login-footer {
  margin-top: 32px;
  text-align: center;
  font-family: var(--f-mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.05em;
}

.login-footer a {
  color: var(--text);
  text-decoration: none;
  transition: color 0.3s;
  margin-left: 8px;
  border-bottom: 1px solid transparent;
}

.login-footer a:hover {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ── RESPONSIVE ── */
@media(max-width: 480px) {
  .login-card {
    padding: 40px 24px;
  }
  .login-header h1 {
    font-size: 32px;
  }
}
</style>
</head>
<body>

  <!-- BACKGROUND -->
  <div class="bg-container">
    <img id="bg-image" src="sfondo/sfondo portamaniglie.webp" alt="Background">
  </div>

  <!-- LOGIN CONTAINER -->
  <div class="login-wrapper">
    
    <div class="logo-container" id="logo">
      <!-- Assumendo che il logo sia SVG, se è bianco si adatterà perfettamente -->
      <img src="../loghi ed immagini/logo.svg" alt="OVERLINE LOGO">
    </div>

    <div class="login-card" id="card">
      <div class="login-header">
        <h1>ACCESSO</h1>
        <p>Inserisci i tuoi dati</p>
      </div>

      <form action="#" method="POST" id="login-form">
        <div class="form-group stagger-item">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="nome@esempio.com" required autocomplete="email">
        </div>

        <div class="form-group stagger-item">
          <label for="password">Password</label>
          <a href="#" class="forgot-pwd">RECUPERA</a>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="cta-btn stagger-item">
          <span>ACCEDI ALL'ATTREZZATURA</span>
        </button>
      </form>

      <div class="login-footer stagger-item">
        Non hai un account? <a href="#">Registrati</a>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    // Animazioni di ingresso sobrie ma d'impatto (come richiesto)
    window.addEventListener('load', () => {
      
      const tl = gsap.timeline();

      // 1. Lieve zoom out del background per dare profondità
      tl.to('#bg-image', {
        scale: 1,
        duration: 2.5,
        ease: 'power2.out'
      }, 0);

      // 2. Fade in e traslazione del logo
      tl.to('#logo', {
        opacity: 1,
        y: 0,
        duration: 1,
        ease: 'power3.out'
      }, 0.2);

      // 3. Fade in e slide su della login card
      tl.to('#card', {
        opacity: 1,
        y: 0,
        duration: 1.2,
        ease: 'power4.out'
      }, 0.4);

      // 4. Elementi interni svelati in sequenza (stagger)
      tl.fromTo('.stagger-item', 
        { opacity: 0, y: 15 },
        { opacity: 1, y: 0, duration: 0.8, stagger: 0.1, ease: 'power2.out' },
        0.8
      );
    });
  </script>
</body>
</html>
