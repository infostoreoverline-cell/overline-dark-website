<!DOCTYPE html>
<html lang="it" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OVERLINE — Accedi all'Armeria</title>
<meta name="description" content="Accedi al tuo account Overline."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"/>
<style>
:root {
  --bg:        #030303;
  --surface:   #0d0d0d;
  --text:      #F0F0F0;
  --muted:     #888888;
  --accent:    #E60000;
  --outline:   #2A2A2A;
  --f-display: 'Anton', sans-serif;
  --f-mono:    'JetBrains Mono', monospace;
  --f-body:    'Hanken Grotesk', sans-serif;
  --ease-expo: cubic-bezier(0.16,1,0.3,1);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100vh;
  overflow: hidden; /* Prevent scrolling for the login page */
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--f-body);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ── BACKGROUND IMAGE & VIGNETTE ── */
.bg-container {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.bg-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: 25% center;
  /* Reso più luminoso e meno opaco */
  filter: blur(2px) grayscale(10%) brightness(1.1);
  opacity: 0.95;
  transform: scale(1.15); /* Slight zoom to hide blur edges */
}

.bg-container::after {
  content: '';
  position: absolute;
  inset: 0;
  /* Scurito meno pesantemente rispetto a prima */
  background: 
    radial-gradient(ellipse at center, transparent 10%, rgba(3,3,3,0.6) 100%),
    linear-gradient(to bottom, rgba(3,3,3,0.1) 0%, rgba(3,3,3,0.5) 100%);
  z-index: 1;
}

/* ── LOGIN WRAPPER ── */
.login-wrapper {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 440px;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── BACK BUTTON LOGO (SCOMPOSIZIONE ANIMATA) ── */
.back-logo {
  position: absolute;
  top: 32px;
  left: 32px;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 80px;  /* Ingrandito come richiesto */
  height: 80px;
  text-decoration: none;
  cursor: pointer;
  opacity: 0;
}

.back-logo .logo-inline {
  position: absolute;
  height: 48px; /* Ingrandito */
  width: auto;
  overflow: visible;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
}

.back-logo .logo-inline path {
  fill: #F0F0F0;
  transform-origin: center;
  /* Transizione lenta e gommosa per quando il mouse esce (riassemblaggio) */
  transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.1s, fill 0.4s, opacity 0.4s 0.2s;
}

.back-logo .arrow-icon {
  position: absolute;
  width: 40px; /* Ingrandita */
  height: 40px;
  color: var(--accent);
  opacity: 0;
  transform: scale(0) rotate(90deg);
  filter: drop-shadow(0 0 0px rgba(230,0,0,0));
  transition: all 0.4s cubic-bezier(0.5, 0, 0, 1);
}

/* ── HOVER: SCOMPOSIZIONE DEI PEZZI ── */
.back-logo:hover .logo-inline path:nth-child(1) {
  /* Pezzo inferiore: schizza giù a sinistra */
  transform: translate(-1500px, 1500px) rotate(-120deg) scale(0.1);
  fill: #E60000;
  opacity: 0;
  /* Schizzo ultra-veloce */
  transition: transform 0.5s cubic-bezier(0.25, 1, 0.25, 1), fill 0.2s, opacity 0.3s 0.1s;
}

.back-logo:hover .logo-inline path:nth-child(2) {
  /* Pezzo superiore: schizza su a destra */
  transform: translate(1500px, -1500px) rotate(120deg) scale(0.1);
  fill: #E60000;
  opacity: 0;
  /* Schizzo ultra-veloce */
  transition: transform 0.5s cubic-bezier(0.25, 1, 0.25, 1), fill 0.2s, opacity 0.3s 0.1s;
}

.back-logo:hover .arrow-icon {
  opacity: 1;
  /* Esplode fuori al posto del logo con effetto rimbalzo */
  transform: scale(1) rotate(0deg);
  filter: drop-shadow(0 0 16px rgba(230,0,0,0.9));
  /* Delay di 0.15s per farla uscire dopo la scomposizione */
  transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.15s;
}

/* ── LOGIN CARD ── */
.login-card {
  width: 100%;
  background: rgba(13, 13, 13, 0.65);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--outline);
  border-left: 2px solid var(--accent);
  padding: 48px 40px;
  opacity: 0;
  transform: translateY(30px);
}

.login-header {
  margin-bottom: 32px;
  text-align: center;
}

.login-header h1 {
  font-family: var(--f-display);
  font-size: 40px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  line-height: 1;
  margin-bottom: 12px;
}

.login-header p {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
}

.form-group {
  margin-bottom: 32px;
  position: relative;
}

.form-group label {
  display: flex;
  align-items: center;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
  transition: transform 0.4s var(--ease-expo), color 0.4s var(--ease-expo);
}

.form-group label::before {
  content: '';
  display: block;
  width: 0;
  height: 2px;
  background: var(--accent);
  margin-right: 0;
  transition: width 0.4s var(--ease-expo), margin-right 0.4s var(--ease-expo);
}

.form-group input {
  width: 100%;
  background: #000;
  border: 1px solid var(--outline);
  padding: 16px;
  font-family: var(--f-mono);
  font-size: 14px;
  color: var(--text);
  outline: none;
  box-shadow: inset 0 0 0 0 var(--accent);
  transition: border-color 0.4s var(--ease-expo), background 0.4s var(--ease-expo), box-shadow 0.4s var(--ease-expo), padding-left 0.4s var(--ease-expo);
}

.form-group:focus-within label {
  color: var(--text);
  transform: translateX(4px);
}

.form-group:focus-within label::before {
  width: 12px;
  margin-right: 8px;
}

.form-group input:focus {
  border-color: var(--accent);
  background: #050505;
  box-shadow: inset 4px 0 0 0 var(--accent);
  padding-left: 20px;
}

/* Typing effect class added via JS */
.form-group input.is-typing {
  background: #0a0a0a;
  box-shadow: inset 8px 0 0 0 var(--accent);
}

.form-group input::placeholder {
  color: rgba(255,255,255,0.2);
  font-family: var(--f-mono);
  font-size: 12px;
}

.forgot-pwd {
  position: absolute;
  top: 0;
  right: 0;
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.3s ease;
}

.forgot-pwd:hover {
  color: var(--accent);
}

.pwd-toggle {
  position: absolute;
  right: 16px;
  bottom: 18px;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--muted);
  background: transparent;
  border: none;
  cursor: pointer;
  transition: color 0.3s ease;
}

.pwd-toggle:hover {
  color: var(--text);
}

/* ── CTA BUTTON ── */
.cta-btn {
  display: block;
  width: 100%;
  background: transparent;
  border: 1px solid var(--text);
  padding: 18px;
  font-family: var(--f-mono);
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text);
  position: relative;
  overflow: hidden;
  transition: color 0.4s var(--ease-expo), border-color 0.4s var(--ease-expo);
  cursor: pointer;
  margin-top: 16px;
}

.cta-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.5s var(--ease-expo);
}

.cta-btn:hover::before {
  transform: scaleX(1);
}

.cta-btn:hover {
  color: #fff;
  border-color: var(--accent);
}

.cta-btn span {
  position: relative;
  z-index: 1;
}

/* ── FOOTER LINKS ── */
.login-footer {
  margin-top: 32px;
  text-align: center;
  font-family: var(--f-mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.05em;
}

.login-footer a {
  color: var(--text);
  text-decoration: none;
  transition: color 0.3s;
  margin-left: 8px;
  border-bottom: 1px solid transparent;
}

.login-footer a:hover {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ── ERROR BANNER ── */
.error-banner {
  background: rgba(230, 0, 0, 0.08);
  color: var(--accent);
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  padding: 12px 16px;
  border: 1px solid rgba(230, 0, 0, 0.15);
  border-left: 3px solid var(--accent);
  margin-bottom: 24px;
  display: none;
  align-items: center;
  gap: 12px;
  text-transform: uppercase;
}

.error-banner span.icon {
  font-size: 14px;
}

/* ── REVEAL EFFECTS ── */
.reveal-wrap { overflow: hidden; display: block; }
.reveal-line { display: block; overflow: hidden; transform: translateY(100%); opacity: 0; }

/* ── SCREEN SHAKE EFFECT (ELEGANT) ── */
@keyframes shake {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  10% { transform: translate(-2px, -1px) rotate(-0.2deg); }
  20% { transform: translate(2px, 1px) rotate(0.2deg); }
  30% { transform: translate(-4px, 2px) rotate(-0.4deg); }
  40% { transform: translate(4px, -2px) rotate(0.4deg); }
  50% { transform: translate(-2px, -1px) rotate(-0.2deg); }
  60% { transform: translate(2px, 2px) rotate(0.2deg); }
  70% { transform: translate(-2px, 1px) rotate(-0.1deg); }
  80% { transform: translate(1px, -1px) rotate(0.1deg); }
  90% { transform: translate(-1px, -1px) rotate(0deg); }
}

.shake {
  animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
  transform-origin: center center;
}

/* ── RESPONSIVE ── */
@media(max-width: 480px) {
  .login-card {
    padding: 40px 24px;
  }
  .login-header h1 {
    font-size: 32px;
  }
}
</style>
</head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/TextPlugin.min.js"></script>
  <script>
    gsap.registerPlugin(TextPlugin);

    // Animazioni di ingresso sobrie ma d'impatto (come richiesto)
    window.addEventListener('load', () => {
      
      const tl = gsap.timeline();

      // 1. Lieve zoom out del background per dare profondità
      tl.to('#bg-image', {
        scale: 1.05,
        duration: 2.5,
        ease: 'power2.out'
      }, 0);

      // 2. Ingresso del tasto Back / Logo in alto a sx
      tl.to('#back-btn', {
        opacity: 1,
        y: 0,
        duration: 1,
        ease: 'power3.out'
      }, 0.2);

      // 3. Fade in e slide su della login card
      tl.to('#card', {
        opacity: 1,
        y: 0,
        duration: 1.2,
        ease: 'expo.out'
      }, 0.3);

      // 4. Titolo principale svelato dal basso
      tl.to('.reveal-line', {
        y: 0,
        opacity: 1,
        duration: 1,
        ease: 'expo.out'
      }, 0.4);

      // 4b. Effetto macchina da scrivere (terminale) per il sottotitolo
      tl.to('.typewriter-text', {
        text: "INSERISCI I TUOI DATI_",
        duration: 0.8,
        ease: 'none'
      }, 0.5);

      // 5. Elementi interni svelati in sequenza "meccanica"
      tl.fromTo('.stagger-item', 
        { opacity: 0, x: -10 },
        { opacity: 1, x: 0, duration: 0.5, stagger: 0.05, ease: 'power4.out' },
        0.6
      );
      
      // 6. Switch dinamico Login/Registrazione
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const mainTitle = document.getElementById('main-title');
      const subtitleText = document.querySelector('.typewriter-text');
      
      let isLogin = true;

      const switchMode = (toRegister) => {
        if (isLogin === !toRegister) return;
        isLogin = !toRegister;
        
        const currentForm = isLogin ? registerForm : loginForm;
        const nextForm = isLogin ? loginForm : registerForm;
        const itemsToHide = currentForm.querySelectorAll(isLogin ? '.stagger-reg' : '.stagger-item');
        const itemsToShow = nextForm.querySelectorAll(isLogin ? '.stagger-item' : '.stagger-reg');
        const newTitle = isLogin ? "ACCESSO" : "REGISTRAZIONE";
        const newSubtitle = isLogin ? "INSERISCI I TUOI DATI_" : "CREA IL TUO PROFILO_";

        // Nasconde il form corrente
        gsap.to(itemsToHide, {
          opacity: 0, x: 10, duration: 0.3, stagger: 0.05, ease: 'power2.in',
          onComplete: () => {
            currentForm.style.display = 'none';
            nextForm.style.display = 'block';
            
            // Cambia titolo
            gsap.to(mainTitle, { y: 20, opacity: 0, duration: 0.2, onComplete: () => {
              mainTitle.textContent = newTitle;
              gsap.to(mainTitle, { y: 0, opacity: 1, duration: 0.4, ease: 'power2.out' });
            }});

            // Effetto macchina da scrivere sul sottotitolo
            gsap.to(subtitleText, { text: newSubtitle, duration: 0.8, ease: 'none' });

            // Mostra il nuovo form
            gsap.fromTo(itemsToShow, 
              { opacity: 0, x: -10 },
              { opacity: 1, x: 0, duration: 0.4, stagger: 0.05, ease: 'power2.out', delay: 0.2 }
            );
          }
        });
      };

      document.getElementById('goto-register').addEventListener('click', (e) => { e.preventDefault(); switchMode(true); });
      document.getElementById('goto-login').addEventListener('click', (e) => { e.preventDefault(); switchMode(false); });

      // 7. Effetti durante la digitazione (Typing Feedback) su tutti gli input
      const inputs = document.querySelectorAll('.form-group input');
      let typingTimer;
      
      inputs.forEach(input => {
        input.addEventListener('input', () => {
          input.classList.add('is-typing');
          clearTimeout(typingTimer);
          typingTimer = setTimeout(() => { input.classList.remove('is-typing'); }, 150);
        });
      });
      
      // 8. Mostra/Nascondi Password (generico per entrambi i form)
      const setupPwdToggle = (toggleId, inputId) => {
        const toggleBtn = document.getElementById(toggleId);
        const pwdIn = document.getElementById(inputId);
        if (toggleBtn && pwdIn) {
          toggleBtn.addEventListener('click', function () {
            const type = pwdIn.getAttribute('type') === 'password' ? 'text' : 'password';
            pwdIn.setAttribute('type', type);
            this.textContent = type === 'password' ? 'NASCONDI' : 'MOSTRA';
          });
        }
      };
      setupPwdToggle('togglePassword', 'password');
      setupPwdToggle('toggleRegPassword', 'reg-password');

      // 9. Animazione "Screen Shake" e Allarme Custom su errore (per entrambi i form)
      const setupFormShake = (formId) => {
        const form = document.getElementById(formId);
        if (!form) return;
        
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const inputs = form.querySelectorAll('input');
          const errorBanner = form.querySelector('.error-banner');
          const errorText = errorBanner.querySelector('span:not(.icon)');
          
          let isValid = true;
          inputs.forEach(input => { if (!input.validity.valid) isValid = false; });

          errorText.textContent = isValid ? "ERRORE DI SISTEMA: DATABASE INACCESSIBILE" : "COMPILA TUTTI I CAMPI CORRETTAMENTE";
          errorBanner.style.display = 'flex';
          
          gsap.fromTo(errorBanner, { opacity: 0, y: -10 }, { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' });
          
          document.body.classList.remove('shake');
          void document.body.offsetWidth;
          document.body.classList.add('shake');

          const inputsToFlash = isValid ? form.querySelectorAll('.form-group input') : form.querySelectorAll('.form-group input:invalid');
          gsap.fromTo(inputsToFlash, 
            { borderColor: '#E60000', backgroundColor: 'rgba(230, 0, 0, 0.05)' },
            { borderColor: 'var(--outline)', backgroundColor: '#000', duration: 1.5, ease: 'power2.out' }
          );
        });
      };
      setupFormShake('login-form');
      setupFormShake('register-form');
    });
  </script>
</body>
</html>
